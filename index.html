<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Umob Vragen Generator</title>
<style>
  :root {
    --bg-start: #0B0C10;
    --bg-end: #17191F;
    --accent: #DAFC5A;
    --accent-ink: #12140C;
    --purple: #DAFC5A;
    --teal: #6FE7D6;
    --green: #4ADE80;
    --orange: #FBBF24;
    --red: #FB7185;
    --ink: #F3F4F1;
    --muted: #9AA0AC;
    --card-bg: #1B1D24;
    --card-bg-alt: #23252E;
    --border-subtle: rgba(255, 255, 255, 0.08);
    --radius-lg: 24px;
    --radius-md: 16px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 16px;
    color: var(--ink);
    background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 100%);
    background-attachment: fixed;
    min-height: 100vh;
    padding-bottom: calc(24px + var(--safe-bottom));
  }

  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    -webkit-appearance: none;
    appearance: none;
  }

  button:focus-visible,
  a:focus-visible,
  input:focus-visible,
  select:focus-visible {
    outline: 3px solid var(--accent);
    outline-offset: 2px;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 16px 12px;
  }

  header.app-header {
    text-align: center;
    color: var(--ink);
    margin-bottom: 20px;
  }

  header.app-header h1 {
    font-size: 26px;
    margin: 0 0 4px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  header.app-header h1 .accent-dot { color: var(--accent); }

  header.app-header p {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
  }

  .category-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 12px;
  }

  @media (min-width: 640px) {
    .category-grid { grid-template-columns: repeat(3, 1fr); }
  }

  .cat-btn {
    background: var(--card-bg);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    min-height: 88px;
    padding: 14px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    text-align: center;
  }

  .cat-btn:active {
    transform: scale(0.96);
    border-color: var(--accent);
    box-shadow: 0 3px 8px rgba(0, 0, 0, 0.35);
  }

  .cat-btn .emoji { font-size: 28px; line-height: 1; }
  .cat-btn .label { font-size: 13px; font-weight: 700; color: var(--ink); }

  .random-btn {
    width: 100%;
    min-height: 64px;
    background: var(--accent);
    color: var(--accent-ink);
    font-weight: 800;
    font-size: 17px;
    border-radius: var(--radius-md);
    box-shadow: 0 8px 24px rgba(218, 252, 90, 0.25);
    margin-top: 4px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .random-btn:active { transform: scale(0.98); }

  @media (max-width: 639px) {
    .random-btn {
      position: sticky;
      bottom: calc(12px + var(--safe-bottom));
      z-index: 5;
    }
  }

  footer.app-footer {
    display: flex;
    justify-content: center;
    gap: 24px;
    padding: 8px 0 calc(12px + var(--safe-bottom));
  }

  footer.app-footer button {
    background: transparent;
    color: var(--muted);
    font-size: 14px;
    font-weight: 600;
    text-decoration: underline;
    min-height: 48px;
    padding: 0 8px;
  }

  footer.app-footer button:active { color: var(--accent); }

  /* ---------- Overlays / Modals ---------- */

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 0;
  }

  .overlay.open { display: flex; }

  @media (min-width: 640px) {
    .overlay {
      padding: 24px;
      backdrop-filter: blur(6px);
    }
  }

  .sheet {
    background: var(--card-bg);
    width: 100%;
    height: 100%;
    max-height: 100%;
    overflow-y: auto;
    padding: 20px 18px calc(20px + var(--safe-bottom));
    position: relative;
  }

  @media (min-width: 640px) {
    .sheet {
      width: 100%;
      max-width: 500px;
      height: auto;
      max-height: 88vh;
      border-radius: var(--radius-lg);
      padding: 24px;
    }
  }

  .sheet-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 44px;
    height: 44px;
    min-width: 44px;
    border-radius: 50%;
    background: var(--card-bg-alt);
    color: var(--ink);
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
  }
  .sheet-close:active { background: var(--border-subtle); }

  .badges-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 0 44px 14px 0;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
  }

  .badge-cat { background: var(--card-bg-alt); color: var(--accent); }
  .badge-type-umob { background: var(--accent); color: var(--accent-ink); }
  .badge-type-adjacent { background: transparent; color: var(--teal); border: 2px solid var(--teal); }
  .badge-diff-makkelijk { background: rgba(74, 222, 128, 0.15); color: var(--green); }
  .badge-diff-middel { background: rgba(251, 191, 36, 0.15); color: var(--orange); }
  .badge-diff-moeilijk { background: rgba(251, 113, 133, 0.15); color: var(--red); }

  .question-text {
    font-size: 21px;
    font-weight: 800;
    line-height: 1.35;
    margin: 0 0 18px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 18px;
  }

  .option-card {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    text-align: left;
    background: var(--card-bg-alt);
    border: 2px solid transparent;
    border-radius: var(--radius-md);
    padding: 14px 16px;
    min-height: 56px;
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
  }

  .option-card .letter {
    width: 30px;
    height: 30px;
    min-width: 30px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--accent-ink);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 800;
  }

  .option-card.selected { border-color: var(--accent); background: rgba(218, 252, 90, 0.1); }
  .option-card.correct-answer { border-color: var(--green); background: rgba(74, 222, 128, 0.12); }
  .option-card.correct-answer .letter { background: var(--green); color: #08140C; }
  .option-card:active { transform: scale(0.99); }

  .answer-box {
    display: none;
    background: var(--card-bg-alt);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    padding: 16px;
    margin-bottom: 18px;
  }
  .answer-box.open { display: block; }
  .answer-box .correct-label { font-weight: 800; color: var(--green); margin-bottom: 6px; font-size: 14px; }
  .answer-box .fact-text { font-size: 15px; line-height: 1.4; color: var(--ink); }

  .modal-actions {
    display: flex;
    gap: 10px;
  }

  .modal-actions button {
    flex: 1;
    min-height: 52px;
    border-radius: var(--radius-md);
    font-weight: 700;
    font-size: 15px;
  }

  .btn-copy { background: var(--card-bg-alt); color: var(--ink); border: 1px solid var(--border-subtle); }
  .btn-copy:active { background: var(--border-subtle); }
  .btn-again { background: var(--accent); color: var(--accent-ink); }
  .btn-again:active { opacity: 0.85; }

  .loading-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 10px;
    gap: 18px;
  }

  .spinner {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 5px solid var(--card-bg-alt);
    border-top-color: var(--accent);
    animation: spin 0.9s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (prefers-reduced-motion: reduce) {
    * , *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  .loading-box p { color: var(--muted); font-weight: 600; }

  .btn-danger {
    width: 100%;
    min-height: 52px;
    background: rgba(251, 113, 133, 0.15);
    color: var(--red);
    border-radius: var(--radius-md);
    font-weight: 700;
    font-size: 15px;
    margin-top: 10px;
  }

  .sheet h2 { font-size: 20px; margin: 0 0 14px; padding-right: 40px; color: var(--ink); }
  .sheet .subtle { color: var(--muted); font-size: 13px; margin: -8px 0 16px; line-height: 1.4; }

  /* ---------- History ---------- */
  .filters-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .filters-row select {
    flex: 1;
    min-height: 48px;
    border-radius: var(--radius-md);
    border: 2px solid var(--border-subtle);
    padding: 0 10px;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    background: var(--card-bg-alt);
  }

  .history-empty { text-align: center; color: var(--muted); padding: 40px 10px; font-size: 14px; }

  .history-group { margin-bottom: 18px; }
  .history-group h3 { font-size: 15px; margin: 0 0 10px; color: var(--ink); display: flex; align-items: center; gap: 6px; }

  .history-item {
    background: var(--card-bg-alt);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .history-item summary {
    list-style: none;
    cursor: pointer;
    font-weight: 700;
    font-size: 14px;
    color: var(--ink);
    display: flex;
    justify-content: space-between;
    gap: 8px;
    align-items: flex-start;
  }
  .history-item summary::-webkit-details-marker { display: none; }
  .history-item .hi-badges { display: flex; gap: 4px; flex-shrink: 0; margin-top: 2px; }
  .history-item .hi-badge { font-size: 10px; padding: 2px 7px; border-radius: 999px; font-weight: 700; white-space: nowrap; }
  .history-item .hi-detail { margin-top: 10px; font-size: 13px; line-height: 1.5; color: var(--muted); }
  .history-item .hi-detail .hi-correct { color: var(--green); font-weight: 700; }

  .export-row { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
  .export-row button {
    flex: 1 1 30%;
    min-height: 48px;
    border-radius: var(--radius-md);
    background: var(--card-bg-alt);
    border: 1px solid var(--border-subtle);
    color: var(--ink);
    font-weight: 700;
    font-size: 13px;
    padding: 0 6px;
  }
  .export-row button:active { background: var(--border-subtle); }
</style>
</head>
<body>

<div class="container">
  <header class="app-header">
    <h1>🎡 Umob Draairad</h1>
    <p>Genereer viral quiz-vragen voor content</p>
  </header>

  <div class="category-grid" id="category-grid"></div>

  <button class="random-btn" id="random-btn" type="button">🎲 Random</button>

  <footer class="app-footer">
    <button type="button" id="open-history">Historie</button>
    <button type="button" id="open-settings">Instellingen</button>
  </footer>
</div>

<!-- Question modal (only closes via X) -->
<div class="overlay" id="question-overlay">
  <div class="sheet" id="question-sheet" role="dialog" aria-modal="true">
    <button class="sheet-close" id="question-close" type="button" aria-label="Sluiten">✕</button>
    <div id="question-body"></div>
  </div>
</div>

<!-- History overlay -->
<div class="overlay" id="history-overlay">
  <div class="sheet" role="dialog" aria-modal="true">
    <button class="sheet-close" id="history-close" type="button" aria-label="Sluiten">✕</button>
    <h2>Historie</h2>
    <div class="filters-row">
      <select id="filter-type">
        <option value="all">Alle types</option>
        <option value="umob">Umob</option>
        <option value="adjacent">Adjacent</option>
      </select>
      <select id="filter-difficulty">
        <option value="all">Alle niveaus</option>
        <option value="makkelijk">Makkelijk</option>
        <option value="middel">Middel</option>
        <option value="moeilijk">Moeilijk</option>
      </select>
    </div>
    <div id="history-content"></div>
    <div class="export-row">
      <button type="button" id="export-json">⬇️ JSON</button>
      <button type="button" id="export-csv">⬇️ CSV</button>
      <button type="button" id="export-copy">📋 Kopieer alles</button>
    </div>
  </div>
</div>

<!-- Settings overlay -->
<div class="overlay" id="settings-overlay">
  <div class="sheet" role="dialog" aria-modal="true">
    <button class="sheet-close" id="settings-close" type="button" aria-label="Sluiten">✕</button>
    <h2>Instellingen</h2>
    <p class="subtle">Vragen komen uit een vaste, lokale vragenbank (~96 vragen) — geen API of internetverbinding nodig.</p>
    <button class="btn-danger" id="settings-clear-all" type="button">Geschiedenis wissen</button>
  </div>
</div>

<script>
(function () {
  "use strict";

  /* ==================== CONFIG ==================== */
  const CONFIG = {
    STORAGE_KEY_QUESTIONS: "umob_questions",
    STORAGE_KEY_USED: "umob_used_pool"
  };

  /* ==================== CATEGORIES ==================== */
  const CATEGORIES = [
    { id: "steden", emoji: "🏙️", label: "Steden & Landen" },
    { id: "vervoer", emoji: "🛴", label: "Vervoer-type" },
    { id: "slim", emoji: "🧠", label: "Slimme reiziger" },
    { id: "app", emoji: "📱", label: "Umob-app" },
    { id: "weetjes", emoji: "💡", label: "Wist je dat" },
    { id: "battle", emoji: "⚔️", label: "Battle" }
  ];

  /* ==================== VASTE VRAGENBANK ====================
     ~96 handmatig samengestelde vragen (16 per categorie, telkens 8 Umob +
     8 Adjacent, verdeeld over makkelijk/middel/moeilijk). Geen API of
     internetverbinding nodig — alles draait lokaal in de browser. */
  const QUESTION_BANK = {
    steden: [
      { question: "In hoeveel landen kun je Umob gebruiken?", options: { A: "12+", B: "20+", C: "35+" }, correct: "B", fact: "Umob is actief in 20+ landen wereldwijd.", type: "umob", difficulty: "makkelijk" },
      { question: "In hoeveel steden is Umob beschikbaar?", options: { A: "100+", B: "150+", C: "260+" }, correct: "C", fact: "Umob dekt 260+ steden — van grote metropolen tot kleinere hubs.", type: "umob", difficulty: "makkelijk" },
      { question: "Hoeveel Umob-accounts heb je nodig om in 5 verschillende landen te reizen?", options: { A: "5", B: "1", C: "Per stad één" }, correct: "B", fact: "Eén account werkt overal waar Umob actief is.", type: "umob", difficulty: "makkelijk" },
      { question: "Welke vervoersvorm zit NIET standaard in Umob?", options: { A: "Deelscooter", B: "Onderzeeër", C: "Deelauto" }, correct: "B", fact: "Best gek om te vragen, maar nee — nog geen onderzeeërs in de app.", type: "umob", difficulty: "middel" },
      { question: "Wat kun je met Umob NIET rechtstreeks vergelijken voordat je boekt?", options: { A: "Prijs", B: "Reistijd", C: "Het weer" }, correct: "C", fact: "Umob laat je prijs én reistijd tussen aanbieders vergelijken — weersvoorspellingen niet.", type: "umob", difficulty: "middel" },
      { question: "Hoeveel losse apps zou je normaal nodig hebben voor alle aanbieders die in Umob zitten?", options: { A: "2-3", B: "5-6", C: "15+" }, correct: "C", fact: "Umob bundelt tientallen aanbieders in één app.", type: "umob", difficulty: "middel" },
      { question: "Wat gebeurt er met je betaling als je met Umob van scooter naar taxi wisselt binnen één rit?", options: { A: "Twee keer apart betalen", B: "Eén betaling in de app", C: "Alleen contant" }, correct: "B", fact: "Pay-in-the-app betekent: geen losse afrekenmomenten per aanbieder.", type: "umob", difficulty: "moeilijk" },
      { question: "Welke van deze drie hoort NIET tussen Umob's aanbieders?", options: { A: "E-bike", B: "OV", C: "Ruimteraket" }, correct: "C", fact: "Nog geen ruimtereizen in Umob — misschien over een paar jaar.", type: "umob", difficulty: "moeilijk" },
      { question: "Welke stad staat bekend als de fietshoofdstad van de wereld?", options: { A: "Amsterdam", B: "Berlijn", C: "Rome" }, correct: "A", fact: "In Amsterdam staan meer fietsen dan er inwoners zijn.", type: "adjacent", difficulty: "makkelijk" },
      { question: "Welke metro was de allereerste ter wereld?", options: { A: "Londense Underground", B: "Parijse Métro", C: "New Yorkse Subway" }, correct: "A", fact: "De Underground opende al in 1863 — ruim 160 jaar geleden.", type: "adjacent", difficulty: "makkelijk" },
      { question: "In welke Italiaanse stad rijden geen auto's, alleen boten?", options: { A: "Milaan", B: "Venetië", C: "Turijn" }, correct: "B", fact: "Venetië heeft simpelweg geen straten breed genoeg voor auto's.", type: "adjacent", difficulty: "middel" },
      { question: "Welk land staat bekend om het hoogste percentage elektrische auto's op de weg?", options: { A: "Duitsland", B: "Noorwegen", C: "Spanje" }, correct: "B", fact: "In Noorwegen is het merendeel van de nieuwverkopen inmiddels elektrisch.", type: "adjacent", difficulty: "middel" },
      { question: "Welk Aziatisch treinstation staat in het Guinness Book of Records als drukste ter wereld?", options: { A: "Tokyo Shinjuku", B: "Seoul Station", C: "Bangkok Hua Lamphong" }, correct: "A", fact: "Shinjuku Station verwerkt dagelijks miljoenen reizigers.", type: "adjacent", difficulty: "middel" },
      { question: "In welke stad werd het allereerste verkeerslicht ter wereld geplaatst (1868)?", options: { A: "New York", B: "Londen", C: "Parijs" }, correct: "B", fact: "Dat eerste verkeerslicht ontplofte binnen een maand — gaslek.", type: "adjacent", difficulty: "moeilijk" },
      { question: "Welke stad voerde als een van de eersten ter wereld een tolheffing in voor auto's in het centrum?", options: { A: "Londen", B: "Berlijn", C: "Madrid" }, correct: "A", fact: "De 'congestion charge' in Londen bestaat sinds 2003.", type: "adjacent", difficulty: "moeilijk" },
      { question: "Welke Aziatische stad heeft zulke strenge regels voor autobezit dat een kenteken duurder kan zijn dan de auto zelf?", options: { A: "Singapore", B: "Tokio", C: "Seoul" }, correct: "A", fact: "In Singapore betaal je eerst voor een 'Certificate of Entitlement' vóór je een auto mag kopen.", type: "adjacent", difficulty: "moeilijk" }
    ],
    vervoer: [
      { question: "Welk vervoer vind je NIET in Umob?", options: { A: "Deelscooter", B: "Waterfiets", C: "Deelauto" }, correct: "B", fact: "Waterfietsen zijn nog geen onderdeel van Umob.", type: "umob", difficulty: "makkelijk" },
      { question: "Welke van deze drie zit WEL in Umob?", options: { A: "Taxi", B: "Zeppelin", C: "Kabelbaan" }, correct: "A", fact: "Taxi is één van de aanbieders die je via Umob kunt boeken.", type: "umob", difficulty: "makkelijk" },
      { question: "Hoeveel soorten deelvervoer breng je samen in Umob?", options: { A: "Alleen scooters", B: "Scooters en fietsen", C: "Scooters, fietsen, auto's, taxi, OV en e-bikes" }, correct: "C", fact: "Umob bundelt vrijwel elk deelvervoer-type in één plek.", type: "umob", difficulty: "makkelijk" },
      { question: "Welk vervoer is meestal het snelst voor een ritje van 2 km binnen de stad?", options: { A: "Deelauto in de spits", B: "Deelscooter", C: "Bus met 4 haltes" }, correct: "B", fact: "Voor korte ritjes wint een scooter vaak van auto's in de file.", type: "umob", difficulty: "middel" },
      { question: "Wat is meestal duurder per kilometer in de stad?", options: { A: "Deelfiets", B: "Taxi", C: "OV" }, correct: "B", fact: "Taxi's zijn doorgaans de duurste optie per kilometer in de stad.", type: "umob", difficulty: "middel" },
      { question: "Welk vervoer heeft geen accu of motor nodig?", options: { A: "E-bike", B: "Deelscooter", C: "Deelfiets" }, correct: "C", fact: "Een gewone deelfiets werkt volledig op spierkracht.", type: "umob", difficulty: "middel" },

      { question: "Wat is erger als reiziger?", options: { A: "Een rit die niet komt opdagen", B: "Een rit die veel te duur blijkt", C: "Een rit die de verkeerde kant op rijdt" }, correct: "A", fact: "Niet komen opdagen scoort het hoogst op de ergernis-schaal — eens?", type: "adjacent", difficulty: "moeilijk" },
      { question: "Kies: hoe zou jij de hele stad willen doorkruisen?", options: { A: "De hele stad alleen te voet", B: "De hele stad alleen met de auto", C: "De hele stad alleen met OV" }, correct: "C", fact: "De meningen liggen hier flink uit elkaar — wat kies jij?", type: "adjacent", difficulty: "moeilijk" }
    ]
  };

  /* ==================== STATE ==================== */
  let currentCategoryId = null;
  let currentQuestion = null;

  /* ==================== STORAGE HELPERS ==================== */
  function getHistory() {
    try {
      const raw = localStorage.getItem(CONFIG.STORAGE_KEY_QUESTIONS);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }
  function saveHistory(list) {
    localStorage.setItem(CONFIG.STORAGE_KEY_QUESTIONS, JSON.stringify(list));
  }
  function addToHistory(record) {
    const list = getHistory();
    list.push(record);
    saveHistory(list);
  }

  function getUsedPool() {
    try {
      const raw = localStorage.getItem(CONFIG.STORAGE_KEY_USED);
      return raw ? JSON.parse(raw) : {};
    } catch (e) {
      return {};
    }
  }
  function saveUsedPool(pool) {
    localStorage.setItem(CONFIG.STORAGE_KEY_USED, JSON.stringify(pool));
  }
  function markUsed(categoryId, questionText) {
    const pool = getUsedPool();
    if (!pool[categoryId]) pool[categoryId] = [];
    pool[categoryId].push(questionText);
    saveUsedPool(pool);
  }
  function resetUsed(categoryId) {
    const pool = getUsedPool();
    pool[categoryId] = [];
    saveUsedPool(pool);
  }

  /* ==================== RANDOM HELPERS ==================== */
  function pickType() {
    return Math.random() < 0.5 ? "umob" : "adjacent";
  }
  function pickRandomCategory() {
    return CATEGORIES[Math.floor(Math.random() * CATEGORIES.length)];
  }

  /* ==================== SELECTIE UIT DE VRAGENBANK ====================
     Rolt eerst 50/50 Umob vs Adjacent, pakt dan een nog-niet-getoonde vraag
     uit die pool. Is die pool op, dan wordt de andere type-pool geprobeerd;
     is de hele categorie op, dan begint de cyclus opnieuw (reset). */
  function pickQuestion(categoryId) {
    const all = QUESTION_BANK[categoryId] || [];
    const used = getUsedPool()[categoryId] || [];
    const type = pickType();

    function unused(list) {
      return list.filter(function (q) { return used.indexOf(q.question) === -1; });
    }

    let candidates = unused(all.filter(function (q) { return q.type === type; }));
    if (candidates.length === 0) {
      candidates = unused(all);
    }
    if (candidates.length === 0) {
      resetUsed(categoryId);
      candidates = all;
    }

    const chosen = candidates[Math.floor(Math.random() * candidates.length)];
    markUsed(categoryId, chosen.question);
    return chosen;
  }

  /* ==================== GENERATION FLOW ====================
     Geen API meer nodig — een vraag "genereren" betekent hier: een nog niet
     getoonde vraag uit de lokale vragenbank kiezen. De korte timeout geeft
     de loader een moment om te tonen, wat bij het "draaien" hoort. */
  function generateQuestion(categoryId) {
    const category = CATEGORIES.find(function (c) { return c.id === categoryId; });
    if (!category) return;
    currentCategoryId = categoryId;

    openQuestionModal();
    renderLoading();

    setTimeout(function () {
      const picked = pickQuestion(categoryId);
      const record = {
        question: picked.question,
        options: picked.options,
        correct: picked.correct,
        fact: picked.fact,
        type: picked.type,
        difficulty: picked.difficulty,
        category: category.id,
        categoryLabel: category.label,
        categoryEmoji: category.emoji,
        createdAt: Date.now()
      };
      addToHistory(record);
      currentQuestion = record;
      renderQuestion(record);
    }, 400);
  }

  /* ==================== MODAL: QUESTION ==================== */
  const questionOverlay = document.getElementById("question-overlay");
  const questionBody = document.getElementById("question-body");

  function openQuestionModal() {
    questionOverlay.classList.add("open");
  }
  function closeQuestionModal() {
    questionOverlay.classList.remove("open");
  }
  document.getElementById("question-close").addEventListener("click", closeQuestionModal);
  // Backdrop click and Escape intentionally do nothing — modal only closes via the X button.

  function renderLoading() {
    questionBody.innerHTML =
      '<div class="loading-box">' +
      '<div class="spinner" aria-hidden="true"></div>' +
      '<p>Vraag wordt gekozen...</p>' +
      '</div>';
  }

  function renderQuestion(q) {
    const diffLabelMap = { makkelijk: "Makkelijk", middel: "Middel", moeilijk: "Moeilijk" };
    const typeLabelMap = { umob: "Umob", adjacent: "Adjacent" };

    let html = '<div class="badges-row">';
    html += '<span class="badge badge-cat">' + q.categoryEmoji + ' ' + escapeHTML(q.categoryLabel) + '</span>';
    html += '<span class="badge badge-type-' + q.type + '">' + typeLabelMap[q.type] + '</span>';
    html += '<span class="badge badge-diff-' + q.difficulty + '">' + diffLabelMap[q.difficulty] + '</span>';
    html += '</div>';

    html += '<p class="question-text">' + escapeHTML(q.question) + '</p>';

    html += '<div class="options" id="options-list">';
    ["A", "B", "C"].forEach(function (letter) {
      const isCorrect = letter === q.correct;
      html += '<button type="button" class="option-card' + (isCorrect ? " correct-answer" : "") + '" data-letter="' + letter + '">' +
        '<span class="letter">' + letter + '</span>' +
        '<span>' + escapeHTML(q.options[letter]) + '</span>' +
        '</button>';
    });
    html += '</div>';

    html += '<div class="answer-box open" id="answer-box">';
    html += '<div class="correct-label">✅ Juist antwoord: ' + q.correct + ') ' + escapeHTML(q.options[q.correct]) + '</div>';
    html += '<div class="fact-text">💡 ' + escapeHTML(q.fact) + '</div>';
    html += '</div>';

    html += '<div class="modal-actions">';
    html += '<button class="btn-copy" type="button" id="copy-btn">📋 Kopieer</button>';
    html += '<button class="btn-again" type="button" id="again-btn">🔁 Nog één</button>';
    html += '</div>';

    questionBody.innerHTML = html;

    document.querySelectorAll("#options-list .option-card").forEach(function (btn) {
      btn.addEventListener("click", function () {
        document.querySelectorAll("#options-list .option-card").forEach(function (b) { b.classList.remove("selected"); });
        btn.classList.add("selected");
      });
    });

    document.getElementById("copy-btn").addEventListener("click", function () {
      copyQuestionToClipboard(q);
    });

    document.getElementById("again-btn").addEventListener("click", function () {
      generateQuestion(q.category);
    });
  }

  function copyQuestionToClipboard(q) {
    const diffLabelMap = { makkelijk: "Makkelijk", middel: "Middel", moeilijk: "Moeilijk" };
    const typeLabelMap = { umob: "Umob", adjacent: "Adjacent" };
    const text =
      q.categoryEmoji + " " + q.categoryLabel + " (" + typeLabelMap[q.type] + ", " + diffLabelMap[q.difficulty] + ")\n\n" +
      "Vraag: " + q.question + "\n" +
      "A) " + q.options.A + "\n" +
      "B) " + q.options.B + "\n" +
      "C) " + q.options.C + "\n\n" +
      "Antwoord: " + q.correct + ") " + q.options[q.correct] + "\n" +
      "Weetje: " + q.fact;

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function () {
        flashCopyButton();
      }).catch(function () {
        fallbackCopy(text);
      });
    } else {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text) {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); } catch (e) { /* ignore */ }
    document.body.removeChild(ta);
    flashCopyButton();
  }

  function flashCopyButton() {
    const btn = document.getElementById("copy-btn");
    if (!btn) return;
    const original = btn.textContent;
    btn.textContent = "✅ Gekopieerd";
    setTimeout(function () { btn.textContent = original; }, 1500);
  }

  function escapeHTML(str) {
    const div = document.createElement("div");
    div.textContent = String(str);
    return div.innerHTML;
  }

  /* ==================== CATEGORY GRID ==================== */
  const grid = document.getElementById("category-grid");
  CATEGORIES.forEach(function (cat) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "cat-btn";
    btn.innerHTML = '<span class="emoji">' + cat.emoji + '</span><span class="label">' + escapeHTML(cat.label) + '</span>';
    btn.addEventListener("click", function () { generateQuestion(cat.id); });
    grid.appendChild(btn);
  });

  document.getElementById("random-btn").addEventListener("click", function () {
    const cat = pickRandomCategory();
    generateQuestion(cat.id);
  });

  /* ==================== HISTORY ==================== */
  const historyOverlay = document.getElementById("history-overlay");
  const historyContent = document.getElementById("history-content");
  const filterType = document.getElementById("filter-type");
  const filterDifficulty = document.getElementById("filter-difficulty");

  document.getElementById("open-history").addEventListener("click", function () {
    renderHistory();
    historyOverlay.classList.add("open");
  });
  document.getElementById("history-close").addEventListener("click", function () {
    historyOverlay.classList.remove("open");
  });
  historyOverlay.addEventListener("click", function (e) {
    if (e.target === historyOverlay) historyOverlay.classList.remove("open");
  });

  filterType.addEventListener("change", renderHistory);
  filterDifficulty.addEventListener("change", renderHistory);

  function getFilteredHistory() {
    const t = filterType.value;
    const d = filterDifficulty.value;
    return getHistory().filter(function (q) {
      if (t !== "all" && q.type !== t) return false;
      if (d !== "all" && q.difficulty !== d) return false;
      return true;
    });
  }

  const diffLabelMap = { makkelijk: "Makkelijk", middel: "Middel", moeilijk: "Moeilijk" };
  const typeLabelMap = { umob: "Umob", adjacent: "Adjacent" };

  function renderHistory() {
    const list = getFilteredHistory();
    if (list.length === 0) {
      historyContent.innerHTML = '<div class="history-empty">Nog geen vragen gegenereerd (of niets matcht je filters).</div>';
      return;
    }

    const grouped = {};
    list.slice().reverse().forEach(function (q) {
      if (!grouped[q.category]) grouped[q.category] = [];
      grouped[q.category].push(q);
    });

    let html = "";
    CATEGORIES.forEach(function (cat) {
      const items = grouped[cat.id];
      if (!items || items.length === 0) return;
      html += '<div class="history-group">';
      html += '<h3>' + cat.emoji + ' ' + escapeHTML(cat.label) + ' (' + items.length + ')</h3>';
      items.forEach(function (q) {
        html += '<details class="history-item">';
        html += '<summary><span>' + escapeHTML(truncate(q.question, 70)) + '</span>';
        html += '<span class="hi-badges">';
        html += '<span class="hi-badge badge-type-' + q.type + '">' + typeLabelMap[q.type] + '</span>';
        html += '<span class="hi-badge badge-diff-' + q.difficulty + '">' + diffLabelMap[q.difficulty] + '</span>';
        html += '</span></summary>';
        html += '<div class="hi-detail">';
        html += 'A) ' + escapeHTML(q.options.A) + '<br>';
        html += 'B) ' + escapeHTML(q.options.B) + '<br>';
        html += 'C) ' + escapeHTML(q.options.C) + '<br>';
        html += '<span class="hi-correct">Antwoord: ' + q.correct + ') ' + escapeHTML(q.options[q.correct]) + '</span><br>';
        html += '💡 ' + escapeHTML(q.fact);
        html += '</div>';
        html += '</details>';
      });
      html += '</div>';
    });

    historyContent.innerHTML = html || '<div class="history-empty">Nog geen vragen gegenereerd.</div>';
  }

  function truncate(str, len) {
    return str.length > len ? str.slice(0, len - 1) + "…" : str;
  }

  /* ---- Export ---- */
  function downloadBlob(content, filename, mime) {
    const blob = new Blob([content], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function csvEscape(val) {
    const s = String(val == null ? "" : val);
    if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  }

  document.getElementById("export-json").addEventListener("click", function () {
    const list = getFilteredHistory();
    downloadBlob(JSON.stringify(list, null, 2), "umob-vragen.json", "application/json");
  });

  document.getElementById("export-csv").addEventListener("click", function () {
    const list = getFilteredHistory();
    const header = ["categorie", "type", "moeilijkheid", "vraag", "A", "B", "C", "correct", "fact"];
    const rows = [header.join(",")];
    list.forEach(function (q) {
      rows.push([
        csvEscape(q.categoryLabel),
        csvEscape(q.type),
        csvEscape(q.difficulty),
        csvEscape(q.question),
        csvEscape(q.options.A),
        csvEscape(q.options.B),
        csvEscape(q.options.C),
        csvEscape(q.correct),
        csvEscape(q.fact)
      ].join(","));
    });
    downloadBlob(rows.join("\n"), "umob-vragen.csv", "text/csv");
  });

  document.getElementById("export-copy").addEventListener("click", function () {
    const list = getFilteredHistory();
    const text = list.map(function (q) {
      return q.categoryEmoji + " " + q.categoryLabel + " (" + typeLabelMap[q.type] + ", " + diffLabelMap[q.difficulty] + ")\n" +
        "Vraag: " + q.question + "\n" +
        "A) " + q.options.A + "\nB) " + q.options.B + "\nC) " + q.options.C + "\n" +
        "Antwoord: " + q.correct + ") " + q.options[q.correct] + "\n" +
        "Weetje: " + q.fact;
    }).join("\n\n---\n\n");

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text || "Geen vragen om te kopiëren.");
    } else {
      fallbackCopy(text || "Geen vragen om te kopiëren.");
    }
  });

  /* ==================== SETTINGS ==================== */
  const settingsOverlay = document.getElementById("settings-overlay");

  document.getElementById("open-settings").addEventListener("click", function () {
    settingsOverlay.classList.add("open");
  });
  document.getElementById("settings-close").addEventListener("click", function () {
    settingsOverlay.classList.remove("open");
  });
  settingsOverlay.addEventListener("click", function (e) {
    if (e.target === settingsOverlay) settingsOverlay.classList.remove("open");
  });

  document.getElementById("settings-clear-all").addEventListener("click", function () {
    if (confirm("Weet je zeker dat je de volledige geschiedenis wilt wissen? Dit kan niet ongedaan gemaakt worden.")) {
      saveHistory([]);
      settingsOverlay.classList.remove("open");
    }
  });

})();
</script>
</body>
</html>
