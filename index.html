<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Umob Vragen Generator</title>
<style>
  :root {
    --bg-start: #0B0C10;
    --bg-end: #17191F;
    --accent: #DAFC5A;
    --accent-ink: #12140C;
    --purple: #DAFC5A;
    --teal: #6FE7D6;
    --green: #4ADE80;
    --orange: #FBBF24;
    --red: #FB7185;
    --ink: #F3F4F1;
    --muted: #9AA0AC;
    --card-bg: #1B1D24;
    --card-bg-alt: #23252E;
    --border-subtle: rgba(255, 255, 255, 0.08);
    --radius-lg: 24px;
    --radius-md: 16px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    /* Achtergrond ook op html (niet alleen body): op iOS Safari onthult
       rubber-band overscroll anders het witte canvas achter de body-box. */
    background: var(--bg-end) linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 100%);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 16px;
    color: var(--ink);
    min-height: 100vh;
    min-height: 100dvh;
    padding-bottom: calc(24px + var(--safe-bottom));
  }

  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    -webkit-appearance: none;
    appearance: none;
  }

  button:focus-visible,
  a:focus-visible,
  input:focus-visible,
  select:focus-visible {
    outline: 3px solid var(--accent);
    outline-offset: 2px;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 16px 12px;
    padding-top: calc(24px + env(safe-area-inset-top, 0px));
  }

  @media (max-width: 639px) {
    .container {
      padding-top: calc(64px + env(safe-area-inset-top, 0px));
    }
  }

  header.app-header {
    position: relative;
    text-align: center;
    color: var(--ink);
    margin-bottom: 20px;
  }

  .app-logo {
    height: 40px;
    width: auto;
    margin: 0 0 8px;
  }

  .lang-toggle {
    position: absolute;
    top: 0;
    right: 0;
    padding: 8px 14px;
    min-height: 36px;
    border-radius: 999px;
    border: 1px solid var(--border-subtle);
    background: var(--card-bg-alt);
    color: var(--ink);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
  .lang-toggle:active { transform: scale(0.96); }

  /* ---------- Swipe captcha ---------- */
  .swipe-track {
    position: relative;
    width: 100%;
    height: 56px;
    border-radius: 28px;
    background: var(--card-bg-alt);
    border: 1px solid var(--border-subtle);
    overflow: hidden;
    margin-top: 22px;
    touch-action: none;
  }
  .swipe-fill {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 56px;
    background: rgba(218, 252, 90, 0.22);
    pointer-events: none;
  }
  #captcha-overlay.captcha-success .swipe-fill { background: rgba(74, 222, 128, 0.28); }
  .swipe-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--muted);
    pointer-events: none;
    transition: opacity 0.15s ease;
  }
  .swipe-handle {
    position: absolute;
    top: 4px;
    left: 4px;
    width: 48px;
    height: 48px;
    min-width: 48px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--accent-ink);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 800;
    cursor: grab;
    touch-action: none;
    user-select: none;
    z-index: 2;
  }
  .swipe-handle:active { cursor: grabbing; }
  #captcha-overlay.captcha-success .swipe-handle { background: var(--green); color: #08140C; }

  header.app-header p {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
  }

  .difficulty-switch {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px;
  }

  .diff-btn {
    flex: 1 1 auto;
    min-width: 72px;
    white-space: nowrap;
    padding: 10px 12px;
    border-radius: 999px;
    border: 1px solid var(--border-subtle);
    background: var(--card-bg);
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
  }

  .diff-btn:active { transform: scale(0.96); }

  .diff-btn.active {
    color: var(--accent-ink);
    background: var(--accent);
    border-color: var(--accent);
  }

  .diff-btn.active.diff-btn-makkelijk { background: var(--green); border-color: var(--green); }
  .diff-btn.active.diff-btn-middel { background: var(--orange); border-color: var(--orange); }
  .diff-btn.active.diff-btn-moeilijk { background: var(--red); border-color: var(--red); }

  .category-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 12px;
  }

  @media (min-width: 640px) {
    .category-grid { grid-template-columns: repeat(3, 1fr); }
  }

  .cat-btn {
    background: var(--card-bg);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    min-height: 88px;
    padding: 14px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    text-align: center;
  }

  .cat-btn:active {
    transform: scale(0.96);
    border-color: var(--accent);
    box-shadow: 0 3px 8px rgba(0, 0, 0, 0.35);
  }

  .cat-btn .emoji { font-size: 28px; line-height: 1; }
  .cat-btn .label { font-size: 13px; font-weight: 700; color: var(--ink); }

  .random-btn {
    width: 100%;
    min-height: 64px;
    background: var(--accent);
    color: var(--accent-ink);
    font-weight: 800;
    font-size: 17px;
    border-radius: var(--radius-md);
    box-shadow: 0 8px 24px rgba(218, 252, 90, 0.25);
    margin-top: 4px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .random-btn:active { transform: scale(0.98); }

  @media (max-width: 639px) {
    .random-btn {
      position: sticky;
      bottom: calc(12px + var(--safe-bottom));
      z-index: 5;
    }
  }

  footer.app-footer {
    display: flex;
    justify-content: center;
    gap: 24px;
    padding: 8px 0 calc(12px + var(--safe-bottom));
  }

  footer.app-footer button {
    background: transparent;
    color: var(--muted);
    font-size: 14px;
    font-weight: 600;
    text-decoration: underline;
    min-height: 48px;
    padding: 0 8px;
  }

  footer.app-footer button:active { color: var(--accent); }

  /* ---------- Overlays / Modals ---------- */

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 0;
  }

  .overlay.open { display: flex; }

  @media (min-width: 640px) {
    .overlay {
      padding: 24px;
      backdrop-filter: blur(6px);
    }
  }

  .sheet {
    background: var(--card-bg);
    width: 100%;
    height: 100%;
    max-height: 100%;
    overflow-y: auto;
    padding: 20px 18px calc(20px + var(--safe-bottom));
    position: relative;
  }

  @media (min-width: 640px) {
    .sheet {
      width: 100%;
      max-width: 500px;
      height: auto;
      max-height: 88vh;
      border-radius: var(--radius-lg);
      padding: 24px;
    }
  }

  .sheet-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 44px;
    height: 44px;
    min-width: 44px;
    border-radius: 50%;
    background: var(--card-bg-alt);
    color: var(--ink);
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
  }
  .sheet-close:active { background: var(--border-subtle); }

  .badges-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 0 44px 14px 0;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
  }

  .badge-cat { background: var(--card-bg-alt); color: var(--accent); }
  .badge-type-umob { background: var(--accent); color: var(--accent-ink); }
  .badge-type-adjacent { background: transparent; color: var(--teal); border: 2px solid var(--teal); }
  .badge-diff-makkelijk { background: rgba(74, 222, 128, 0.15); color: var(--green); }
  .badge-diff-middel { background: rgba(251, 191, 36, 0.15); color: var(--orange); }
  .badge-diff-moeilijk { background: rgba(251, 113, 133, 0.15); color: var(--red); }

  .question-text {
    font-size: 21px;
    font-weight: 800;
    line-height: 1.35;
    margin: 0 0 18px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 18px;
  }

  .option-card {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    text-align: left;
    background: var(--card-bg-alt);
    border: 2px solid transparent;
    border-radius: var(--radius-md);
    padding: 14px 16px;
    min-height: 56px;
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
  }

  .option-card .letter {
    width: 30px;
    height: 30px;
    min-width: 30px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--accent-ink);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 800;
  }

  .option-card.selected { border-color: var(--accent); background: rgba(218, 252, 90, 0.1); }
  .option-card.correct-answer { border-color: var(--green); background: rgba(74, 222, 128, 0.12); }
  .option-card.correct-answer .letter { background: var(--green); color: #08140C; }
  .option-card:active { transform: scale(0.99); }

  .answer-box {
    display: none;
    background: var(--card-bg-alt);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    padding: 16px;
    margin-bottom: 18px;
  }
  .answer-box.open { display: block; }
  .answer-box .correct-label { font-weight: 800; color: var(--green); margin-bottom: 6px; font-size: 14px; }
  .answer-box .fact-text { font-size: 15px; line-height: 1.4; color: var(--ink); }

  .modal-actions {
    display: flex;
    gap: 10px;
  }

  .modal-actions button {
    flex: 1;
    min-height: 52px;
    border-radius: var(--radius-md);
    font-weight: 700;
    font-size: 15px;
  }

  .btn-copy { background: var(--card-bg-alt); color: var(--ink); border: 1px solid var(--border-subtle); }
  .btn-copy:active { background: var(--border-subtle); }
  .btn-again { background: var(--accent); color: var(--accent-ink); }
  .btn-again:active { opacity: 0.85; }

  .loading-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 10px;
    gap: 18px;
  }

  .spinner {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 5px solid var(--card-bg-alt);
    border-top-color: var(--accent);
    animation: spin 0.9s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (prefers-reduced-motion: reduce) {
    * , *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  .loading-box p { color: var(--muted); font-weight: 600; }

  .btn-secondary {
    width: 100%;
    min-height: 52px;
    background: var(--card-bg-alt);
    color: var(--ink);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    font-weight: 700;
    font-size: 15px;
    margin-top: 10px;
  }
  .btn-secondary:active { background: var(--border-subtle); }

  .btn-danger {
    width: 100%;
    min-height: 52px;
    background: rgba(251, 113, 133, 0.15);
    color: var(--red);
    border-radius: var(--radius-md);
    font-weight: 700;
    font-size: 15px;
    margin-top: 10px;
  }

  .sheet h2 { font-size: 20px; margin: 0 0 14px; padding-right: 40px; color: var(--ink); }
  .sheet .subtle { color: var(--muted); font-size: 13px; margin: -8px 0 16px; line-height: 1.4; }

  /* ---------- History ---------- */
  .filters-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .filters-row select {
    flex: 1;
    min-height: 48px;
    border-radius: var(--radius-md);
    border: 2px solid var(--border-subtle);
    padding: 0 10px;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    background: var(--card-bg-alt);
  }

  .history-empty { text-align: center; color: var(--muted); padding: 40px 10px; font-size: 14px; }

  .history-group { margin-bottom: 18px; }
  .history-group h3 { font-size: 15px; margin: 0 0 10px; color: var(--ink); display: flex; align-items: center; gap: 6px; }

  .history-item {
    background: var(--card-bg-alt);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .history-item summary {
    list-style: none;
    cursor: pointer;
    font-weight: 700;
    font-size: 14px;
    color: var(--ink);
    display: flex;
    justify-content: space-between;
    gap: 8px;
    align-items: flex-start;
  }
  .history-item summary::-webkit-details-marker { display: none; }
  .history-item .hi-badges { display: flex; gap: 4px; flex-shrink: 0; margin-top: 2px; }
  .history-item .hi-badge { font-size: 10px; padding: 2px 7px; border-radius: 999px; font-weight: 700; white-space: nowrap; }
  .history-item .hi-detail { margin-top: 10px; font-size: 13px; line-height: 1.5; color: var(--muted); }
  .history-item .hi-detail .hi-correct { color: var(--green); font-weight: 700; }

  .export-row { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
  .export-row button {
    flex: 1 1 30%;
    min-height: 48px;
    border-radius: var(--radius-md);
    background: var(--card-bg-alt);
    border: 1px solid var(--border-subtle);
    color: var(--ink);
    font-weight: 700;
    font-size: 13px;
    padding: 0 6px;
  }
  .export-row button:active { background: var(--border-subtle); }
</style>
</head>
<body>

<!-- Swipe-captcha: eenmalige menselijke check bij eerste bezoek. Puur
     client-side (geen server om tegen te controleren) — bedoeld als
     drempel tegen simpele/casual bots, geen harde beveiliging. -->
<div class="overlay" id="captcha-overlay">
  <div class="sheet" role="dialog" aria-modal="true">
    <h2>Welkom 👋</h2>
    <p class="subtle">Sleep de knop helemaal naar rechts om te bevestigen dat je geen bot bent.</p>
    <div class="swipe-track" id="swipe-track">
      <div class="swipe-fill" id="swipe-fill"></div>
      <span class="swipe-label" id="swipe-label">Sleep om te bevestigen →</span>
      <div class="swipe-handle" id="swipe-handle" role="slider" aria-label="Sleep om te bevestigen" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">➡️</div>
    </div>
  </div>
</div>

<div class="container">
  <header class="app-header">
    <button class="lang-toggle" id="lang-toggle" type="button">🇬🇧 EN</button>
    <img src="UMOB_LOGO_RGB_YELLOW.png" alt="Umob" class="app-logo">
    <p id="header-subtitle">Genereer viral quiz-vragen voor content</p>
  </header>

  <div class="difficulty-switch" id="difficulty-switch"></div>

  <div class="category-grid" id="category-grid"></div>

  <button class="random-btn" id="random-btn" type="button">🎲 Random</button>

  <footer class="app-footer">
    <button type="button" id="open-history">Historie</button>
    <button type="button" id="open-settings">Instellingen</button>
  </footer>
</div>

<!-- Question modal (only closes via X) -->
<div class="overlay" id="question-overlay">
  <div class="sheet" id="question-sheet" role="dialog" aria-modal="true">
    <button class="sheet-close" id="question-close" type="button" aria-label="Sluiten">✕</button>
    <div id="question-body"></div>
  </div>
</div>

<!-- History overlay -->
<div class="overlay" id="history-overlay">
  <div class="sheet" role="dialog" aria-modal="true">
    <button class="sheet-close" id="history-close" type="button" aria-label="Sluiten">✕</button>
    <h2 id="history-title">Historie</h2>
    <div class="filters-row">
      <select id="filter-type">
        <option value="all" id="opt-all-types">Alle types</option>
        <option value="umob">Umob</option>
        <option value="adjacent">Adjacent</option>
      </select>
      <select id="filter-difficulty">
        <option value="all" id="opt-all-levels">Alle niveaus</option>
        <option value="makkelijk" id="opt-diff-makkelijk">Makkelijk</option>
        <option value="middel" id="opt-diff-middel">Middel</option>
        <option value="moeilijk" id="opt-diff-moeilijk">Moeilijk</option>
      </select>
    </div>
    <div id="history-content"></div>
    <div class="export-row">
      <button type="button" id="export-json">⬇️ JSON</button>
      <button type="button" id="export-csv">⬇️ CSV</button>
      <button type="button" id="export-copy">📋 Kopieer alles</button>
    </div>
  </div>
</div>

<!-- Settings overlay -->
<div class="overlay" id="settings-overlay">
  <div class="sheet" role="dialog" aria-modal="true">
    <button class="sheet-close" id="settings-close" type="button" aria-label="Sluiten">✕</button>
    <h2 id="settings-title">Instellingen</h2>
    <p class="subtle" id="settings-info">Vragen komen uit een vaste, lokale vragenbank (~202 vragen) — geen API of internetverbinding nodig.</p>
    <button class="btn-secondary" id="settings-reset-pool" type="button">🔄 Pool resetten (alle vragen weer beschikbaar)</button>
    <button class="btn-danger" id="settings-clear-all" type="button">Geschiedenis wissen</button>
  </div>
</div>

<script>
(function () {
  "use strict";

  /* ==================== SWIPE CAPTCHA ====================
     Eenmalige menselijke check bij eerste bezoek per browser/toestel.
     Puur client-side: geen server om tegen te verifiëren, dus dit is een
     drempel tegen simpele/casual bots — geen harde beveiliging. */
  (function initCaptcha() {
    const CAPTCHA_KEY = "umob_captcha_verified";
    if (localStorage.getItem(CAPTCHA_KEY) === "true") return;

    const overlay = document.getElementById("captcha-overlay");
    const track = document.getElementById("swipe-track");
    const handle = document.getElementById("swipe-handle");
    const fill = document.getElementById("swipe-fill");
    const label = document.getElementById("swipe-label");
    overlay.classList.add("open");
    document.body.style.overflow = "hidden";

    let dragging = false;
    let maxX = 0;

    function updateDims() {
      maxX = track.clientWidth - handle.offsetWidth - 8;
    }

    function setPosition(x) {
      x = Math.max(0, Math.min(maxX, x));
      handle.style.transform = "translateX(" + x + "px)";
      fill.style.width = (x + handle.offsetWidth) + "px";
      const pct = maxX > 0 ? x / maxX : 0;
      label.style.opacity = String(1 - pct);
      handle.setAttribute("aria-valuenow", String(Math.round(pct * 100)));
      return pct;
    }

    function complete() {
      localStorage.setItem(CAPTCHA_KEY, "true");
      overlay.classList.add("captcha-success");
      setTimeout(function () {
        overlay.classList.remove("open");
        document.body.style.overflow = "";
      }, 350);
    }

    function onPointerDown(e) {
      dragging = true;
      updateDims();
      if (handle.setPointerCapture && e.pointerId != null) {
        handle.setPointerCapture(e.pointerId);
      }
    }
    function onPointerMove(e) {
      if (!dragging) return;
      const rect = track.getBoundingClientRect();
      const x = e.clientX - rect.left - handle.offsetWidth / 2;
      const pct = setPosition(x);
      if (pct >= 0.92) {
        dragging = false;
        setPosition(maxX);
        complete();
      }
    }
    function onPointerUp() {
      if (!dragging) return;
      dragging = false;
      setPosition(0);
    }

    handle.addEventListener("pointerdown", onPointerDown);
    handle.addEventListener("pointermove", onPointerMove);
    handle.addEventListener("pointerup", onPointerUp);
    handle.addEventListener("pointercancel", onPointerUp);

    // Toetsenbord-alternatief (pijltjestoetsen) voor toegankelijkheid.
    handle.addEventListener("keydown", function (e) {
      updateDims();
      let step = 24;
      if (e.key === "ArrowRight" || e.key === "ArrowUp") {
        const current = maxX * (parseInt(handle.getAttribute("aria-valuenow"), 10) / 100);
        const pct = setPosition(current + step);
        if (pct >= 0.92) { setPosition(maxX); complete(); }
        e.preventDefault();
      } else if (e.key === "ArrowLeft" || e.key === "ArrowDown") {
        const current = maxX * (parseInt(handle.getAttribute("aria-valuenow"), 10) / 100);
        setPosition(current - step);

  /* ==================== STATE ==================== */
  let currentCategoryId = null;
  let currentQuestion = null;

  /* ==================== STORAGE HELPERS ==================== */
  function getHistory() {
    try {
      const raw = localStorage.getItem(CONFIG.STORAGE_KEY_QUESTIONS);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }
  function saveHistory(list) {
    localStorage.setItem(CONFIG.STORAGE_KEY_QUESTIONS, JSON.stringify(list));
  }
  function addToHistory(record) {
    const list = getHistory();
    list.push(record);
    saveHistory(list);
  }

  function getUsedPool() {
    try {
      const raw = localStorage.getItem(CONFIG.STORAGE_KEY_USED);
      return raw ? JSON.parse(raw) : {};
    } catch (e) {
      return {};
    }
  }
  function saveUsedPool(pool) {
    localStorage.setItem(CONFIG.STORAGE_KEY_USED, JSON.stringify(pool));
  }
  function markUsed(categoryId, questionText) {
    const pool = getUsedPool();
    if (!pool[categoryId]) pool[categoryId] = [];
    pool[categoryId].push(questionText);
    saveUsedPool(pool);
  }
  function resetUsed(categoryId) {
    const pool = getUsedPool();
    pool[categoryId] = [];
    saveUsedPool(pool);
  }

  /* ==================== RANDOM HELPERS ==================== */
  function pickType() {
    return Math.random() < 0.5 ? "umob" : "adjacent";
  }
  function pickRandomCategory() {
    return CATEGORIES[Math.floor(Math.random() * CATEGORIES.length)];
  }

  /* ==================== SELECTIE UIT DE VRAGENBANK ====================
     Rolt eerst 50/50 Umob vs Adjacent, pakt dan een nog-niet-getoonde vraag
     uit die pool. Is die pool op, dan wordt de andere type-pool geprobeerd;
     is de hele categorie op, dan begint de cyclus opnieuw (reset). */
  function pickQuestion(categoryId) {
    const bankAll = getBank()[categoryId] || [];
    const used = getUsedPool()[categoryId] || [];
    const type = pickType();
    const diffFilter = getDifficultyFilter();

    // Scoop eerst op moeilijkheid. Heeft deze categorie daar niks van (bv.
    // "Makkelijk" bij Topografie), val dan terug op de hele categorie in
    // plaats van niks te kunnen tonen.
    const byDifficulty = diffFilter === "alle"
      ? bankAll
      : bankAll.filter(function (q) { return q.difficulty === diffFilter; });
    const all = byDifficulty.length > 0 ? byDifficulty : bankAll;

    function unused(list) {
      return list.filter(function (q) { return used.indexOf(q.question) === -1; });
    }

    let candidates = unused(all.filter(function (q) { return q.type === type; }));
    if (candidates.length === 0) {
      candidates = unused(all);
    }
    if (candidates.length === 0) {
      resetUsed(categoryId);
      candidates = all;
    }

    const chosen = candidates[Math.floor(Math.random() * candidates.length)];
    markUsed(categoryId, chosen.question);
    return chosen;
  }

  /* ==================== SPAM-LIMIT ====================
     Client-side snelheidsrem: voorkomt dubbele/opeengestapelde vragen bij
     snel doorklikken of bots die de knoppen automatisch indrukken. Er is
     geen server meer om écht tegen te verifiëren — dit is een grens aan
     hoe snel/veel er lokaal gegenereerd kan worden, geen harde beveiliging. */
  const RATE_MIN_GAP_MS = 350;
  const RATE_WINDOW_MS = 60000;
  const RATE_MAX_IN_WINDOW = 25;
  let lastGenerateAt = 0;
  let generateTimestamps = [];

  function isRateLimited() {
    const now = Date.now();
    if (now - lastGenerateAt < RATE_MIN_GAP_MS) return true;
    generateTimestamps = generateTimestamps.filter(function (t) { return now - t < RATE_WINDOW_MS; });
    if (generateTimestamps.length >= RATE_MAX_IN_WINDOW) return true;
    generateTimestamps.push(now);
    lastGenerateAt = now;
    return false;
  }

  /* ==================== GENERATION FLOW ====================
     Geen API meer nodig — een vraag "genereren" betekent hier: een nog niet
     getoonde vraag uit de lokale vragenbank kiezen. De korte timeout geeft
     de loader een moment om te tonen, wat bij het "draaien" hoort. */
  function generateQuestion(categoryId) {
    const category = CATEGORIES.find(function (c) { return c.id === categoryId; });
    if (!category) return;

    // Extra kliks binnen de rem worden stil genegeerd — de huidige vraag (of
    // loader) blijft gewoon staan, zodat "Nog één" nooit uit beeld verdwijnt.
    if (isRateLimited()) return;

    currentCategoryId = categoryId;

    openQuestionModal();
    renderLoading();

    setTimeout(function () {
      const picked = pickQuestion(categoryId);
      const record = {
        question: picked.question,
        options: picked.options,
        correct: picked.correct,
        fact: picked.fact,
        type: picked.type,
        difficulty: picked.difficulty,
        category: category.id,
        categoryLabel: catLabel(category),
        categoryEmoji: category.emoji,
        createdAt: Date.now()
      };
      addToHistory(record);
      currentQuestion = record;
      renderQuestion(record);
    }, 400);
  }

  /* ==================== MODAL: QUESTION ==================== */
  const questionOverlay = document.getElementById("question-overlay");
  const questionBody = document.getElementById("question-body");

  function openQuestionModal() {
    questionOverlay.classList.add("open");
  }
  function closeQuestionModal() {
    questionOverlay.classList.remove("open");
  }
  document.getElementById("question-close").addEventListener("click", closeQuestionModal);
  // Backdrop click and Escape intentionally do nothing — modal only closes via the X button.

  function renderLoading() {
    questionBody.innerHTML =
      '<div class="loading-box">' +
      '<div class="spinner" aria-hidden="true"></div>' +
      '<p>' + escapeHTML(t("loading")) + '</p>' +
      '</div>';
  }

  function renderQuestion(q) {
    let html = '<div class="badges-row">';
    html += '<span class="badge badge-cat">' + q.categoryEmoji + ' ' + escapeHTML(q.categoryLabel) + '</span>';
    html += '<span class="badge badge-type-' + q.type + '">' + typeLabel(q.type) + '</span>';
    html += '<span class="badge badge-diff-' + q.difficulty + '">' + diffLabel(q.difficulty) + '</span>';
    html += '</div>';

    html += '<p class="question-text">' + escapeHTML(q.question) + '</p>';

    html += '<div class="options" id="options-list">';
    ["A", "B", "C"].forEach(function (letter) {
      const isCorrect = letter === q.correct;
      html += '<button type="button" class="option-card' + (isCorrect ? " correct-answer" : "") + '" data-letter="' + letter + '">' +
        '<span class="letter">' + letter + '</span>' +
        '<span>' + escapeHTML(q.options[letter]) + '</span>' +
        '</button>';
    });
    html += '</div>';

    html += '<div class="answer-box open" id="answer-box">';
    html += '<div class="correct-label">' + escapeHTML(t("correctPrefix")) + q.correct + ') ' + escapeHTML(q.options[q.correct]) + '</div>';
    html += '<div class="fact-text">💡 ' + escapeHTML(q.fact) + '</div>';
    html += '</div>';

    html += '<div class="modal-actions">';
    html += '<button class="btn-copy" type="button" id="copy-btn">' + escapeHTML(t("copy")) + '</button>';
    html += '<button class="btn-again" type="button" id="again-btn">' + escapeHTML(t("again")) + '</button>';
    html += '</div>';

    questionBody.innerHTML = html;

    document.querySelectorAll("#options-list .option-card").forEach(function (btn) {
      btn.addEventListener("click", function () {
        document.querySelectorAll("#options-list .option-card").forEach(function (b) { b.classList.remove("selected"); });
        btn.classList.add("selected");
      });
    });

    document.getElementById("copy-btn").addEventListener("click", function () {
      copyQuestionToClipboard(q);
    });

    document.getElementById("again-btn").addEventListener("click", function () {
      generateQuestion(q.category);
    });
  }

  function copyQuestionToClipboard(q) {
    const text =
      q.categoryEmoji + " " + q.categoryLabel + " (" + typeLabel(q.type) + ", " + diffLabel(q.difficulty) + ")\n\n" +
      t("questionLabel") + q.question + "\n" +
      "A) " + q.options.A + "\n" +
      "B) " + q.options.B + "\n" +
      "C) " + q.options.C + "\n\n" +
      t("answerLabel") + q.correct + ") " + q.options[q.correct] + "\n" +
      t("factLabel") + q.fact;

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function () {
        flashCopyButton();
      }).catch(function () {
        fallbackCopy(text);
      });
    } else {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text) {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); } catch (e) { /* ignore */ }
    document.body.removeChild(ta);
    flashCopyButton();
  }

  function flashCopyButton() {
    const btn = document.getElementById("copy-btn");
    if (!btn) return;
    const original = btn.textContent;
    btn.textContent = t("copied");
    setTimeout(function () { btn.textContent = original; }, 1500);
  }

  function escapeHTML(str) {
    const div = document.createElement("div");
    div.textContent = String(str);
    return div.innerHTML;
  }

  /* ==================== DIFFICULTY SWITCH UI ====================
     flex-wrap + gap zorgt dat de knoppen op elke schermbreedte netjes
     doorlopen naar een volgende regel in plaats van over elkaar heen
     te vallen. */
  const diffSwitch = document.getElementById("difficulty-switch");
  function diffSwitchLabel(d) {
    return d === "alle" ? t("diffSwitchAll") : diffLabel(d);
  }
  function renderDifficultySwitch() {
    const current = getDifficultyFilter();
    diffSwitch.innerHTML = "";
    DIFFICULTIES.forEach(function (d) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "diff-btn" + (d === current ? " active diff-btn-" + d : "");
      btn.textContent = diffSwitchLabel(d);
      btn.setAttribute("aria-pressed", d === current ? "true" : "false");
      btn.addEventListener("click", function () {
        if (getDifficultyFilter() === d) return;
        setDifficultyFilter(d);
        renderDifficultySwitch();
      });
      diffSwitch.appendChild(btn);
    });
  }
  renderDifficultySwitch();

  /* ==================== CATEGORY GRID ==================== */
  const grid = document.getElementById("category-grid");
  function renderCategoryGrid() {
    grid.innerHTML = "";
    CATEGORIES.forEach(function (cat) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "cat-btn";
      btn.innerHTML = '<span class="emoji">' + cat.emoji + '</span><span class="label">' + escapeHTML(catLabel(cat)) + '</span>';
      btn.addEventListener("click", function () { generateQuestion(cat.id); });
      grid.appendChild(btn);
    });
  }
  renderCategoryGrid();

  document.getElementById("random-btn").addEventListener("click", function () {
    const cat = pickRandomCategory();
    generateQuestion(cat.id);
  });

  });

  filterType.addEventListener("change", renderHistory);
  filterDifficulty.addEventListener("change", renderHistory);

  function getFilteredHistory() {
    const typeFilter = filterType.value;
    const d = filterDifficulty.value;
    return getHistory().filter(function (q) {
      if (typeFilter !== "all" && q.type !== typeFilter) return false;
      if (d !== "all" && q.difficulty !== d) return false;
      return true;
    });
  }

  function renderHistory() {
    const list = getFilteredHistory();
    if (list.length === 0) {
      historyContent.innerHTML = '<div class="history-empty">' + escapeHTML(t("historyEmptyFiltered")) + '</div>';
      return;
    }

    const grouped = {};
    list.slice().reverse().forEach(function (q) {
      if (!grouped[q.category]) grouped[q.category] = [];
      grouped[q.category].push(q);
    });

    let html = "";
    CATEGORIES.forEach(function (cat) {
      const items = grouped[cat.id];
      if (!items || items.length === 0) return;
      html += '<div class="history-group">';
      html += '<h3>' + cat.emoji + ' ' + escapeHTML(catLabel(cat)) + ' (' + items.length + ')</h3>';
      items.forEach(function (q) {
        html += '<details class="history-item">';
        html += '<summary><span>' + escapeHTML(truncate(q.question, 70)) + '</span>';
        html += '<span class="hi-badges">';
        html += '<span class="hi-badge badge-type-' + q.type + '">' + typeLabel(q.type) + '</span>';
        html += '<span class="hi-badge badge-diff-' + q.difficulty + '">' + diffLabel(q.difficulty) + '</span>';
        html += '</span></summary>';
        html += '<div class="hi-detail">';
        html += 'A) ' + escapeHTML(q.options.A) + '<br>';
        html += 'B) ' + escapeHTML(q.options.B) + '<br>';
        html += 'C) ' + escapeHTML(q.options.C) + '<br>';
        html += '<span class="hi-correct">' + escapeHTML(t("answerLabel")) + q.correct + ') ' + escapeHTML(q.options[q.correct]) + '</span><br>';
        html += '💡 ' + escapeHTML(q.fact);
        html += '</div>';
        html += '</details>';
      });
      html += '</div>';
    });

    historyContent.innerHTML = html || '<div class="history-empty">' + escapeHTML(t("historyEmpty")) + '</div>';
  }

  function truncate(str, len) {
    return str.length > len ? str.slice(0, len - 1) + "…" : str;
  }

  /* ---- Export ---- */
  function downloadBlob(content, filename, mime) {
    const blob = new Blob([content], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function csvEscape(val) {
    const s = String(val == null ? "" : val);
    if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  }

  document.getElementById("export-json").addEventListener("click", function () {
    const list = getFilteredHistory();
    downloadBlob(JSON.stringify(list, null, 2), t("jsonFilename"), "application/json");
  });

  document.getElementById("export-csv").addEventListener("click", function () {
    const list = getFilteredHistory();
    const rows = [t("csvHeader").join(",")];
    list.forEach(function (q) {
      rows.push([
        csvEscape(q.categoryLabel),
        csvEscape(q.type),
        csvEscape(q.difficulty),
        csvEscape(q.question),
        csvEscape(q.options.A),
        csvEscape(q.options.B),
        csvEscape(q.options.C),
        csvEscape(q.correct),
        csvEscape(q.fact)
      ].join(","));
    });
    downloadBlob(rows.join("\n"), t("csvFilename"), "text/csv");
  });

  document.getElementById("export-copy").addEventListener("click", function () {
    const list = getFilteredHistory();
    const text = list.map(function (q) {
      return q.categoryEmoji + " " + q.categoryLabel + " (" + typeLabel(q.type) + ", " + diffLabel(q.difficulty) + ")\n" +
        t("questionLabel") + q.question + "\n" +
        "A) " + q.options.A + "\nB) " + q.options.B + "\nC) " + q.options.C + "\n" +
        t("answerLabel") + q.correct + ") " + q.options[q.correct] + "\n" +
        t("factLabel") + q.fact;
    }).join("\n\n---\n\n");

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text || t("noQuestionsToCopy"));
    } else {
      fallbackCopy(text || t("noQuestionsToCopy"));
    }
  });

  /* ==================== SETTINGS ==================== */
  const settingsOverlay = document.getElementById("settings-overlay");

  document.getElementById("open-settings").addEventListener("click", function () {
    settingsOverlay.classList.add("open");
  });
  document.getElementById("settings-close").addEventListener("click", function () {
    settingsOverlay.classList.remove("open");
  });
  settingsOverlay.addEventListener("click", function (e) {
    if (e.target === settingsOverlay) settingsOverlay.classList.remove("open");
  });

  document.getElementById("settings-reset-pool").addEventListener("click", function () {
    saveUsedPool({});
    const btn = this;
    const original = btn.textContent;
    btn.textContent = t("resetPoolDone");
    setTimeout(function () { btn.textContent = original; }, 1500);
  });

  document.getElementById("settings-clear-all").addEventListener("click", function () {
    if (confirm(t("clearHistoryConfirm"))) {
      saveHistory([]);
      settingsOverlay.classList.remove("open");
    }
  });

  /* ==================== LANGUAGE TOGGLE ==================== */
  function applyLanguage() {
    document.getElementById("lang-toggle").textContent = t("langToggle");
    document.getElementById("header-subtitle").textContent = t("subtitle");
    document.getElementById("random-btn").textContent = t("random");
    document.getElementById("open-history").textContent = t("history");
    document.getElementById("open-settings").textContent = t("settings");
    document.getElementById("history-title").textContent = t("historyTitle");
    document.getElementById("opt-all-types").textContent = t("allTypes");
    document.getElementById("opt-all-levels").textContent = t("allLevels");
    document.getElementById("opt-diff-makkelijk").textContent = t("diffMakkelijk");
    document.getElementById("opt-diff-middel").textContent = t("diffMiddel");
    document.getElementById("opt-diff-moeilijk").textContent = t("diffMoeilijk");
    document.getElementById("export-json").textContent = t("exportJson");
    document.getElementById("export-csv").textContent = t("exportCsv");
    document.getElementById("export-copy").textContent = t("exportCopy");
    document.getElementById("settings-title").textContent = t("settingsTitle");
    document.getElementById("settings-info").textContent = t("settingsInfo");
    document.getElementById("settings-reset-pool").textContent = t("resetPool");
    document.getElementById("settings-clear-all").textContent = t("clearHistory");
    renderCategoryGrid();
    renderDifficultySwitch();
    if (historyOverlay.classList.contains("open")) renderHistory();
  }

  document.getElementById("lang-toggle").addEventListener("click", function () {
    setLang(getLang() === "en" ? "nl" : "en");
    applyLanguage();
  });

  applyLanguage();

})();
</script>
</body>
</html>
